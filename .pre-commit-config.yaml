---
repos:
  # Keep each Colab notebook (.ipynb) and its py:percent script in lockstep; runs
  # before ruff so an edit on either side is synced before the .ipynb is linted.
  - repo: https://github.com/mwouts/jupytext
    rev: v1.19.4
    hooks:
      - id: jupytext
        args: ["--to", "notebook", "--update"]
        files: ^notebooks/.*\.py$

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.17
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/astral-sh/ty-pre-commit
    rev: v0.0.49
    hooks:
      - id: ty

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-merge-conflict
      - id: check-symlinks
      - id: check-json
      - id: check-yaml
      - id: check-toml
      - id: detect-private-key
      - id: end-of-file-fixer
      - id: trailing-whitespace
